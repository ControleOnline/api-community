name: Deploy Project Production
on:
  push:
    branches: [production]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: "18.17.1"
      - name: Update Controle Online
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.API_HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.CONTROLEONLINE }}
          port: ${{ secrets.PORT }}
          script: |
                  export PATH="/usr/local/bin:/usr/bin:/bin:$PATH"
                  cd ~/sistemas/controleonline/api
                  git fetch origin
                  git checkout master
                  git reset --hard origin/master
                  git clean -fd
                  git submodule sync --recursive
                  git submodule update --recursive --init
                  git submodule foreach --recursive '
                    git fetch origin
                    if git show-ref --verify --quiet refs/heads/master; then
                      git checkout master
                    else
                      git checkout -B master origin/master
                    fi
                    git reset --hard origin/master
                    git clean -fd
                  '
                  COMPOSER_BIN="$(command -v composer || true)"
                  if [ -z "$COMPOSER_BIN" ]; then
                    for candidate in /usr/local/bin/composer /usr/bin/composer "$HOME/bin/composer"; do
                      if [ -x "$candidate" ]; then
                        COMPOSER_BIN="$candidate"
                        break
                      fi
                    done
                  fi
                  if [ -z "$COMPOSER_BIN" ]; then
                    echo "Composer not found on remote server"
                    exit 1
                  fi
                  "$COMPOSER_BIN" install --no-interaction --no-suggest
                  rm -rf var/cache/prod/pools/system
                  rm -rf var/cache/prod/doctrine/orm
                  rm -f var/cache/prod/serialization.php
                  php -d opcache.enable_cli=0 bin/console about --env=prod --no-debug >/dev/null
                  php bin/console tenant:migrations:migrate --no-interaction
