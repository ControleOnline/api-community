name: Deploy API NEW LaveGo
on:
  push:
    branches: [staging]
  workflow_dispatch:
  
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "18.17.1"

      - name: Update API NEW LaveGo
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST_APINEW_LAVEGO }}
          username: ${{ secrets.USER_APINEW_LAVEGO }}
          password: ${{ secrets.PASS_APINEW_LAVEGO }}
          port: ${{ secrets.PORT_APINEW_LAVEGO }}
          script: |
                  export PATH="/usr/local/bin:/usr/bin:/bin:$PATH"
                  cd ~/api
                  git fetch origin
                  git checkout master
                  git reset --hard origin/master
                  git clean -fd
                  git submodule sync --recursive
                  git submodule update --recursive --init
                  git submodule foreach --recursive '
                    git fetch origin
                    if git show-ref --verify --quiet refs/heads/master; then
                      git checkout master
                    else
                      git checkout -B master origin/master
                    fi
                    git reset --hard origin/master
                    git clean -fd
                  '
                  COMPOSER_BIN="$(command -v composer || true)"
                  if [ -z "$COMPOSER_BIN" ]; then
                    for candidate in /usr/local/bin/composer /usr/bin/composer "$HOME/bin/composer"; do
                      if [ -x "$candidate" ]; then
                        COMPOSER_BIN="$candidate"
                        break
                      fi
                    done
                  fi
                  if [ -z "$COMPOSER_BIN" ]; then
                    echo "Composer not found on remote server"
                    exit 1
                  fi
                  "$COMPOSER_BIN" install --no-interaction --no-suggest
                  rm -rf var/cache/prod/pools/system
                  rm -rf var/cache/prod/doctrine/orm
                  rm -f var/cache/prod/serialization.php
                  php -d opcache.enable_cli=0 bin/console about --env=prod --no-debug >/dev/null
                  php bin/console tenant:migrations:migrate --no-interaction
                  mkdir -p var/log
                  nohup php bin/console tenant:messenger:consume async --domain=apinew.lave-go.com >> var/log/tenant-messenger-consume.log 2>&1 </dev/null &


                  ### OBRIGATÓRIO PARA FUNCIONAR COM O PHP 8.4 - NÃO REMOVER ###
                  
                  HTACCESS="$HOME/public_html/.htaccess"
                
                  BLOCK_START="cPanel-generated handler"
                
                  if ! grep -qF "$BLOCK_START" "$HTACCESS" 2>/dev/null; then
                    cat <<'EOF' >> "$HTACCESS"
                
                  # php -- BEGIN cPanel-generated handler, do not edit
                  # Set the “ea-php84” package as the default “PHP” programming language.
                  <IfModule mime_module>
                    AddHandler application/x-httpd-ea-php84 .php .php8 .phtml
                  </IfModule>
                  # php -- END cPanel-generated handler, do not edit
                
                  EOF
                  fi
