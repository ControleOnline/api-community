checks:
  php: true

build:
  nodes:
    analysis:
      dependencies:
        after:
          - composer require --dev --no-interaction --no-progress --no-scripts squizlabs/php_codesniffer:^3.11
      tests:
        override:
          - php-scrutinizer-run
          - command: phpcs-run
            use_website_config: true

filter:
  excluded_paths:
    - "tests/*"
    - "var/*"
    - "vendor/*"
    - "public/vendor/*"
